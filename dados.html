<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administração – Despesas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0D0D12;
      --bg2:        #12121A;
      --surface:    #17171F;
      --surface2:   #1E1E28;
      --border:     #2A2A38;
      --border-lit: #3D3D55;
      --ink:        #EEEEF5;
      --ink-muted:  #7878A0;
      --purple:     #8B5CF6;
      --purple-lt:  #8B5CF618;
      --green:      #34D399;
      --green-lt:   #34D39915;
      --red:        #F87171;
      --radius:     12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--ink);
      min-height: 100vh; padding: 40px 24px 80px;
      position: relative; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -160px; right: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(ellipse, #8B5CF610 0%, transparent 65%);
      pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; bottom: -100px; left: -60px;
      width: 400px; height: 400px;
      background: radial-gradient(ellipse, #34D39910 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── Header ── */
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 16px; margin-bottom: 32px;
      padding-bottom: 24px; border-bottom: 1px solid var(--border);
      position: relative; z-index: 1;
    }
    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem,4vw,2.4rem);
      font-weight: 800; line-height: 1.1;
    }
    .page-header h1 span { color: var(--purple); }
    .page-header p { font-size: 13px; color: var(--ink-muted); margin-top: 5px; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      padding: 9px 18px; border-radius: 10px; border: 1px solid var(--border);
      cursor: pointer; letter-spacing: .01em; transition: all .2s;
      background: var(--surface2); color: var(--ink);
    }
    .btn:hover { border-color: var(--border-lit); background: #25253A; }
    .btn-purple {
      background: var(--purple); border-color: var(--purple); color: #fff; font-weight: 600;
    }
    .btn-purple:hover { background: #7C3AED; border-color: #7C3AED; }

    /* ── Summary ── */
    .summary {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
      gap: 14px; margin-bottom: 24px; position: relative; z-index: 1;
    }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; position: relative; overflow: hidden;
    }
    .stat::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    }
    .stat.purple-stat::after { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
    .stat.green-stat::after  { background: linear-gradient(90deg, transparent, var(--green), transparent); }
    .stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-muted); margin-bottom: 10px; }
    .stat .value { font-size: 1.7rem; font-weight: 700; font-family: 'Syne', sans-serif; }
    .stat .value.purple { color: var(--purple); }
    .stat .value.green  { color: var(--green); }
    .stat .value.muted  { font-size: 1rem; font-family: 'Inter', sans-serif; font-weight: 400; color: var(--ink-muted); padding-top: 4px; }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden;
      position: relative; z-index: 1;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
    thead th {
      padding: 13px 16px; text-align: left;
      font-size: 10.5px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--ink-muted); white-space: nowrap;
    }
    tbody tr { border-top: 1px solid var(--border); transition: background .15s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 12px 16px; vertical-align: middle; }

    .td-nome  { font-weight: 500; color: var(--ink); }
    .td-valor { font-weight: 700; color: var(--green); white-space: nowrap; font-family: 'Syne', sans-serif; }
    .td-num   { color: var(--ink-muted); font-size: 12px; }
    .td-muted { color: var(--ink-muted); }

    .badge {
      display: inline-block; font-size: 11px; font-weight: 500;
      padding: 3px 10px; border-radius: 99px;
      background: var(--purple-lt); color: var(--purple);
      border: 1px solid #8B5CF625; white-space: nowrap;
    }

    /* ── Empty / Loading ── */
    #estado {
      padding: 64px 20px; text-align: center; color: var(--ink-muted);
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    #estado .icon { font-size: 2.4rem; }
    #estado p { font-size: 14px; line-height: 1.6; }
    #estado a { color: var(--purple); text-decoration: none; }
    .loader {
      width: 34px; height: 34px;
      border: 2px solid var(--border); border-top-color: var(--purple);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { margin-top: 28px; font-size: 12px; color: #44445A; text-align: center; position: relative; z-index: 1; }
    footer a { color: var(--purple); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 680px) {
      table { font-size: 12.5px; }
      thead th, tbody td { padding: 10px 10px; }
      .page-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div>
      <h1>Despesas <span>registradas</span></h1>
      <p id="subtitle">Carregando dados…</p>
    </div>
    <div class="actions">
      <button class="btn" onclick="exportarCSV()">⬇ Exportar CSV</button>
      <button class="btn" onclick="carregar()">↺ Atualizar</button>
    </div>
  </div>

  <div class="summary">
    <div class="stat purple-stat">
      <div class="label">Lançamentos</div>
      <div class="value purple" id="stat-count">—</div>
    </div>
    <div class="stat green-stat">
      <div class="label">Total (R$)</div>
      <div class="value green" id="stat-total">—</div>
    </div>
    <div class="stat">
      <div class="label">Última entrada</div>
      <div class="value muted" id="stat-last">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <div id="estado">
      <div class="loader"></div>
      <p>Buscando dados no Google Sheets…</p>
    </div>
    <table id="tabela" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Data</th>
          <th>Solicitante</th>
          <th>Categoria</th>
          <th>Descrição</th>
          <th>Forma pgto.</th>
          <th>Valor</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <footer>
    Dados armazenados no Google Sheets &nbsp;·&nbsp;
    <a href="index.html">← Voltar ao formulário</a>
  </footer>

  <script>
    // ── CONFIG ──────────────────────────────────────────
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3dGrdYNciz8kNnvNhSUEzecGq70pz64BE3-ZddvpBU7k4toafZJA8h7MK8P-8-W0Qvg/exec';
    // ────────────────────────────────────────────────────

    const fmt     = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
    const fmtDate = s => { if (!s) return '—'; const [y,m,d] = String(s).split('-'); return `${d}/${m}/${y}`; };
    const esc     = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    let dadosGlobais = [];

    function setEstado(html) {
      document.getElementById('estado').innerHTML = html;
      document.getElementById('estado').style.display = '';
      document.getElementById('tabela').style.display = 'none';
    }

    async function carregar() {
      if (APPS_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbz3dGrdYNciz8kNnvNhSUEzecGq70pz64BE3-ZddvpBU7k4toafZJA8h7MK8P-8-W0Qvg/exec') {
        setEstado('<span class="icon">⚙️</span><p>Configure a URL do Apps Script no arquivo para carregar os dados.</p>');
        document.getElementById('subtitle').textContent = 'URL não configurada';
        return;
      }
      setEstado('<div class="loader"></div><p>Buscando dados no Google Sheets…</p>');
      try {
        const res  = await fetch(APPS_SCRIPT_URL + '?acao=listar');
        const json = await res.json();
        renderizar(json.dados || []);
      } catch {
        setEstado('<span class="icon">⚠️</span><p>Não foi possível carregar os dados.<br>Verifique a URL do Apps Script ou sua conexão.</p>');
        document.getElementById('subtitle').textContent = 'Erro ao carregar';
      }
    }

    function renderizar(dados) {
      dadosGlobais = dados;
      if (!dados.length) {
        setEstado('<span class="icon">📭</span><p>Nenhuma despesa registrada ainda.<br><a href="index.html">← Ir para o formulário</a></p>');
        ['stat-count','stat-total','stat-last'].forEach(id => document.getElementById(id).textContent = '—');
        document.getElementById('subtitle').textContent = 'Nenhum registro';
        return;
      }

      document.getElementById('estado').style.display = 'none';
      document.getElementById('tabela').style.display = '';

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      let total = 0;

      dados.forEach((d, i) => {
        total += parseFloat(d.valor) || 0;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="td-num">${i + 1}</td>
          <td class="td-muted">${fmtDate(d.data)}</td>
          <td class="td-nome">${esc(d.nome)}</td>
          <td><span class="badge">${esc(d.categoria)}</span></td>
          <td style="max-width:200px;white-space:normal;color:var(--ink-muted)">${esc(d.descricao)}</td>
          <td class="td-muted">${esc(d.pagamento)}</td>
          <td class="td-valor">${fmt.format(d.valor)}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('stat-count').textContent = dados.length;
      document.getElementById('stat-total').textContent = fmt.format(total);
      document.getElementById('stat-last').textContent  = fmtDate(dados[dados.length - 1]?.data);
      document.getElementById('subtitle').textContent   =
        `${dados.length} lançamento${dados.length > 1 ? 's' : ''} · atualizado agora`;
    }

    function exportarCSV() {
      if (!dadosGlobais.length) { alert('Nenhum dado para exportar.'); return; }
      const header = ['Data','Solicitante','Categoria','Descrição','Forma de Pagamento','Valor (R$)'];
      const linhas = dadosGlobais.map(d =>
        [fmtDate(d.data), d.nome, d.categoria, d.descricao, d.pagamento, parseFloat(d.valor).toFixed(2)]
          .map(v => `"${String(v).replace(/"/g,'""')}"`)
          .join(',')
      );
      const csv  = [header.join(','), ...linhas].join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a'); a.href = url; a.download = 'despesas.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    carregar();
  </script>
</body>
</html>
